name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: mingw32-make
        shell: cmd

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: particle.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxrender-dev

      - name: Build
        run: make

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: particle

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ github.ref_name }} windows/particle.exe linux/particle --generate-notes --repo ${{ github.repository }}
